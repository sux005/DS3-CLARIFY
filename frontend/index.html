<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLARIFY</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">CLARIFY</div>
      <nav class="nav">
        <a href="#" class="nav-item active">Analyze</a>
        <a href="#" class="nav-item">History</a>
        <a href="#" class="nav-item">Settings</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Upload Song Panel -->
      <section class="panel">
        <h2 class="panel-title">Upload Song</h2>
        <div class="upload-area">
          <p class="upload-hint">Drag &amp; drop audio</p>
        </div>
        <button class="analyze-btn">Analyze</button>
        <div class="metadata-row">
          <div class="metadata-field">
            <label>Song Title</label>
            <div class="input-box"></div>
          </div>
          <div class="metadata-field">
            <label>Artist</label>
            <div class="input-box"></div>
          </div>
        </div>
      </section>

      <!-- Lyrics Panel -->
      <section class="panel">
        <h2 class="panel-title">Lyrics</h2>
        <textarea class="lyrics-area" placeholder="Paste lyrics..."></textarea>
      </section>

      <!-- Analysis Panel -->
      <section class="panel">
        <h2 class="panel-title">Analysis</h2>
        <p class="analysis-label">Summary</p>
        <div class="analysis-box"></div>
        <p class="analysis-label">Insights here</p>
        <div class="analysis-box"></div>
      </section>

    </main>
  </div>
</body>
</html>
